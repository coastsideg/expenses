<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Members — Australian Politicians</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="masthead">
  <div class="container">
    <div>
      <h1>Australian Politicians</h1>
      <div class="tagline">Expenses, interests and salaries — public record, transcribed</div>
    </div>
    <nav class="nav">
      <a href="index.html">Overview</a>
      <a href="expenses.html">Expenses</a>
      <a href="members.html" class="active">Members</a>
      <a href="summary.html">Summary</a>
      <a href="https://github.com/icacpls/icacpls.github.io" target="_blank">Source</a>
    </nav>
  </div>
</header>

<main class="container">
  <h2 class="section">Members and Senators</h2>
  <p class="muted small">All parliamentarians appearing in the loaded reporting periods. Click any name for full breakdown.</p>

  <div class="filters">
    <div class="field">
      <label for="f-search">Search</label>
      <input id="f-search" type="search" placeholder="Name, electorate...">
    </div>
    <div class="field">
      <label for="f-party">Party</label>
      <select id="f-party"><option value="">All parties</option></select>
    </div>
    <div class="field">
      <label for="f-state">State</label>
      <select id="f-state"><option value="">All states</option></select>
    </div>
    <div class="field">
      <label for="f-chamber">Chamber</label>
      <select id="f-chamber">
        <option value="">Both</option>
        <option value="reps">House of Reps</option>
        <option value="senate">Senate</option>
      </select>
    </div>
  </div>

  <div id="counter" class="muted small" style="margin-bottom:6px"></div>
  <div id="table"></div>
</main>

<footer class="site-footer">
  <div class="container">
    <p class="small">Source: <a href="https://www.ipea.gov.au/reporting" target="_blank">IPEA</a>.</p>
  </div>
</footer>

<script src="scripts.js"></script>
<script>
(async function () {
  const all = await loadJSON("data/members.json");

  const parties = [...new Set(all.map(m => m.party))].filter(Boolean).sort();
  parties.forEach(p => { const o = document.createElement("option"); o.value=p; o.textContent=p; document.getElementById("f-party").appendChild(o); });
  const states = [...new Set(all.map(m => m.state))].filter(Boolean).sort();
  states.forEach(s => { const o = document.createElement("option"); o.value=s; o.textContent=s; document.getElementById("f-state").appendChild(o); });

  const cols = [
    { key: "name", label: "Name", render: (r) => `<a href="member.html?id=${encodeURIComponent(r.id)}">${r.name}</a>` },
    { key: "party", label: "Party", render: (r) => chip(r.party) },
    { key: "state", label: "State" },
    { key: "electorate", label: "Electorate / Senator", render: (r) => r.is_senator ? `<em class="muted">Senator</em>` : (r.electorate || "—") },
    { key: "expense_count", label: "Items", type: "num" },
    { key: "total", label: "Total Spend", type: "num", render: (r) => fmt.money(r.total) },
  ];
  const counter = document.getElementById("counter");
  const table = renderTable(document.getElementById("table"), cols, all, { sortKey: "total", sortDir: "desc", pageSize: 50 });

  function applyFilters() {
    const q = document.getElementById("f-search").value.trim().toLowerCase();
    const party = document.getElementById("f-party").value;
    const state = document.getElementById("f-state").value;
    const chamber = document.getElementById("f-chamber").value;
    const filtered = all.filter(m => {
      if (party && m.party !== party) return false;
      if (state && m.state !== state) return false;
      if (chamber === "reps" && m.is_senator) return false;
      if (chamber === "senate" && !m.is_senator) return false;
      if (q) {
        const hay = `${m.name} ${m.electorate} ${m.party_full}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
    table.setRows(filtered);
    counter.innerHTML = `${fmt.num(filtered.length)} of ${fmt.num(all.length)} parliamentarians`;
  }
  ["f-search","f-party","f-state","f-chamber"].forEach(id => {
    document.getElementById(id).addEventListener("input", applyFilters);
  });
  applyFilters();
})();
</script>
</body>
</html>
